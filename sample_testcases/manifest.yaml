# ─────────────────────────────────────────────────────────────────────────────
#  C/C++ — Focused vulnerability files
#  5 true positives, 5 false positives
# ─────────────────────────────────────────────────────────────────────────────

c_cpp:
  - file: c_cpp/buffer_ops.c
    line: 37
    function: copy_username
    cwe_id: CWE-120
    vulnerability_type: buffer_overflow
    classification: true_positive
    expected_resolution: sast
    description: >
      strcpy with no bounds check copies untrusted src into fixed
      64-byte dest buffer. Classic heap/stack overflow.

  - file: c_cpp/buffer_ops.c
    line: 82
    function: read_input
    cwe_id: CWE-120
    vulnerability_type: buffer_overflow
    classification: true_positive
    expected_resolution: sast
    description: >
      gets() used ignoring size parameter — unbounded read into
      buffer causes overflow. gets() is inherently unsafe.

  - file: c_cpp/format_handler.c
    line: 69
    function: log_user_message
    cwe_id: CWE-134
    vulnerability_type: format_string
    classification: true_positive
    expected_resolution: sast
    description: >
      User-controlled msg passed directly as printf format argument.
      Attacker can read/write stack memory via format specifiers.

  - file: c_cpp/command_runner.c
    line: 47
    function: ping_host
    cwe_id: CWE-78
    vulnerability_type: command_injection
    classification: true_positive
    expected_resolution: sast
    description: >
      User-supplied hostname interpolated via sprintf into shell
      command string executed by system(). Allows ; and | injection.

  - file: c_cpp/memory_manager.c
    line: 114
    function: process_buffer
    cwe_id: CWE-416
    vulnerability_type: use_after_free
    classification: true_positive
    expected_resolution: sast
    description: >
      buf->data dereferenced after free(buf). Classic use-after-free
      enabling heap corruption or code execution.

  - file: c_cpp/buffer_ops.c
    line: 109
    function: safe_copy
    cwe_id: CWE-120
    vulnerability_type: buffer_overflow
    classification: false_positive
    fp_tier: basic
    expected_resolution: sast
    description: >
      strncpy bounded by dest_size-1 with explicit null termination.
      Proper bounds checking — SAST should recognize safe pattern.

  - file: c_cpp/format_handler.c
    line: 116
    function: log_safe
    cwe_id: CWE-134
    vulnerability_type: format_string
    classification: false_positive
    fp_tier: basic
    expected_resolution: sast
    description: >
      printf called with explicit "%s" format specifier. msg is a
      data argument, not a format string.

  - file: c_cpp/command_runner.c
    line: 98
    function: check_disk_space
    cwe_id: CWE-78
    vulnerability_type: command_injection
    classification: false_positive
    fp_tier: contextual
    expected_resolution: graph
    description: >
      system() called with hardcoded string literal "df -h /tmp".
      No user input in data flow — requires taint analysis to
      confirm the command string is constant.

  - file: c_cpp/memory_manager.c
    line: 157
    function: resize_buffer
    cwe_id: CWE-416
    vulnerability_type: use_after_free
    classification: false_positive
    fp_tier: contextual
    expected_resolution: graph
    description: >
      realloc result checked before use; buf updated to new_buf
      only on success path. Requires control-flow graph analysis
      to verify no dangling pointer dereference.

  - file: c_cpp/buffer_ops.c
    line: 138
    function: copy_bounded
    cwe_id: CWE-120
    vulnerability_type: buffer_overflow
    classification: false_positive
    fp_tier: adversarial
    expected_resolution: llm
    description: >
      strcpy used (triggers all SAST heuristics) but preceded by
      assert(strlen(src) < DEST_CAPACITY). The assertion guarantees
      source fits in destination. Requires semantic reasoning about
      the pre-condition to classify as safe.

