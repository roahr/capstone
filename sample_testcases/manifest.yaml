# =============================================================================
# Sec-C Sample Test Cases — Ground Truth Manifest
# =============================================================================
# Multi-Stage Code Security Framework for Adaptive Vulnerability Triage
# and Detection
#
# This manifest defines the expected classification for every vulnerability
# instance in the test suite. Use it to measure precision, recall, and
# cascade efficiency per stage.
#
# Fields:
#   file                    - Relative path from sample_testcases/
#   line                    - Primary line number of the vulnerability
#   function                - Enclosing function or scope
#   cwe_id                  - CWE identifier
#   vulnerability_type      - Short name for the vulnerability class
#   classification          - true_positive | false_positive
#   fp_tier                 - basic | contextual | adversarial (FP only)
#   expected_resolution     - sast | graph | llm (which stage should resolve)
#   description             - Why this is a TP or FP
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
#  PYTHON — Flask micro-app "SecureNotes"
#  6 true positives, 6 false positives
# ─────────────────────────────────────────────────────────────────────────────

python:
  - file: python/db.py
    line: 79
    function: search_notes
    cwe_id: CWE-89
    vulnerability_type: sql_injection
    classification: true_positive
    expected_resolution: sast
    description: >
      SQL injection via f-string interpolation of user_query into LIKE clause.
      Attacker-controlled input directly embedded in SQL string.

  - file: python/utils.py
    line: 43
    function: export_notes
    cwe_id: CWE-78
    vulnerability_type: os_command_injection
    classification: true_positive
    expected_resolution: sast
    description: >
      OS command injection via os.system() with user-supplied filename
      interpolated into shell command string.

  - file: python/app.py
    line: 186
    function: download_file
    cwe_id: CWE-22
    vulnerability_type: path_traversal
    classification: true_positive
    expected_resolution: sast
    description: >
      Path traversal — user-supplied filename joined to UPLOAD_DIR via
      os.path.join without sanitization, served via send_file.

  - file: python/utils.py
    line: 94
    function: load_session
    cwe_id: CWE-502
    vulnerability_type: insecure_deserialization
    classification: true_positive
    expected_resolution: sast
    description: >
      Insecure deserialization — pickle.loads on user-controlled
      base64-decoded data enables arbitrary code execution.

  - file: python/app.py
    line: 168
    function: search_page
    cwe_id: CWE-79
    vulnerability_type: xss
    classification: true_positive
    expected_resolution: sast
    description: >
      Reflected XSS — query parameter embedded directly in HTML response
      without escaping via make_response.

  - file: python/auth.py
    line: 28
    function: module_scope
    cwe_id: CWE-798
    vulnerability_type: hardcoded_credentials
    classification: true_positive
    expected_resolution: sast
    description: >
      Hardcoded credentials — DB_PASSWORD and API_KEY defined as plain
      string literals at module scope.

  - file: python/db.py
    line: 96
    function: get_note_by_id
    cwe_id: CWE-89
    vulnerability_type: sql_injection
    classification: false_positive
    fp_tier: basic
    expected_resolution: sast
    description: >
      Parameterized query with ? placeholder and tuple binding.
      SAST should recognize this as a safe prepared-statement pattern.

  - file: python/utils.py
    line: 67
    function: create_backup
    cwe_id: CWE-78
    vulnerability_type: os_command_injection
    classification: false_positive
    fp_tier: basic
    expected_resolution: sast
    description: >
      subprocess.run with list args (no shell=True). No shell
      interpretation possible — SAST should resolve by recognizing
      the safe subprocess invocation pattern.

  - file: python/db.py
    line: 117
    function: get_recent_notes
    cwe_id: CWE-89
    vulnerability_type: sql_injection
    classification: false_positive
    fp_tier: contextual
    expected_resolution: graph
    description: >
      f-string SQL with int(days) cast. Type coercion guarantees only a
      numeric literal reaches the query. Requires data-flow analysis to
      see that the int() call sanitizes the input.

  - file: python/app.py
    line: 204
    function: serve_avatar
    cwe_id: CWE-22
    vulnerability_type: path_traversal
    classification: false_positive
    fp_tier: contextual
    expected_resolution: graph
    description: >
      os.path.realpath + startswith(UPLOAD_DIR) check guards against
      traversal before send_file. Requires control-flow graph analysis
      to verify the validation precedes the file access.

  - file: python/utils.py
    line: 130
    function: calculate_expression
    cwe_id: CWE-94
    vulnerability_type: eval_injection
    classification: false_positive
    fp_tier: adversarial
    expected_resolution: llm
    description: >
      eval() call guarded by strict regex allowlist ^[0-9+\-*/().  ]+$.
      No identifiers or builtins can pass. Requires semantic reasoning
      to determine the regex makes eval safe.

  - file: python/auth.py
    line: 50
    function: get_db_credentials
    cwe_id: CWE-798
    vulnerability_type: hardcoded_credentials
    classification: false_positive
    fp_tier: adversarial
    expected_resolution: llm
    description: >
      Variable user_password = "placeholder" immediately overwritten by
      os.environ.get("DB_PASS"). The hardcoded value is a default that
      never reaches production. Requires understanding initialization
      patterns to classify as safe.

