      Hardcoded JWT secret "my-super-secret-jwt-key-2024" used
      unconditionally for token signing and verification.

  - file: javascript/routes/tasks.js
    line: 237
    function: router.get_summary
    cwe_id: CWE-79
    vulnerability_type: xss
    classification: false_positive
    fp_tier: basic
    expected_resolution: sast
    description: >
      SAST flags template interpolation into HTML, but all values
      pass through escapeHtml() first. No injection possible.

  - file: javascript/routes/tasks.js
    line: 116
    function: router.get_by_id
    cwe_id: CWE-89
    vulnerability_type: sql_injection
    classification: false_positive
    fp_tier: basic
    expected_resolution: sast
    description: >
      SAST flags SQL string with WHERE clause, but id is passed as
      a bind parameter (?), not interpolated.

  - file: javascript/utils.js
    line: 65
    function: snapshotConfig
    cwe_id: CWE-94
    vulnerability_type: eval_injection
    classification: false_positive
    fp_tier: contextual
    expected_resolution: graph
    description: >
      SAST flags eval(), but data-flow shows input is JSON.stringify
      of server-side config object. No user data reaches this call.

  - file: javascript/routes/users.js
    line: 131
    function: router.get_static_asset
    cwe_id: CWE-22
    vulnerability_type: path_traversal
    classification: false_positive
    fp_tier: contextual
    expected_resolution: graph
    description: >
      SAST flags path.resolve + sendFile, but control-flow shows
      resolvedPath is checked against STATIC_ASSETS_DIR prefix
      before serving.

  - file: javascript/utils.js
    line: 88
    function: safeDeepMerge
    cwe_id: CWE-1321
    vulnerability_type: prototype_pollution
    classification: false_positive
    fp_tier: adversarial
    expected_resolution: llm
    description: >
      SAST flags recursive target[key]=source[key], but function
      freezes Object.prototype and skips __proto__/constructor/
      prototype keys. No pollution vector exists.

  - file: javascript/server.js
    line: 24
    function: module_scope
    cwe_id: CWE-798
    vulnerability_type: hardcoded_credentials
    classification: false_positive
    fp_tier: adversarial
    expected_resolution: llm
    description: >
      Looks like hardcoded secret, but guard block throws Error in
      production if env var not overridden. Placeholder never used
      in production environments.

