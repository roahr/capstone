      Eval injection — user-supplied filterExpr from query params
      passed directly to eval() with no sanitization.

  - file: javascript/routes/tasks.js
    line: 95
    function: router.get_search
    cwe_id: CWE-89
    vulnerability_type: sql_injection
    classification: true_positive
